[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
asyncio_mode = auto
pythonpath = src
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    gate_refusal_expected: WO-025 §3 — this test intentionally makes the pre-connection clock/transport
        gate REFUSE (its own S13/D37 bite proof), so the gate ledger tolerates its refusals. Declared,
        never inferred (D34-3). A test carrying this marker MUST produce at least one refusal, or the
        ledger fails it as a STALE MARKER (a hole opening quietly).
