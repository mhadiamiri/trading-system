## Import-Linter Contracts

### New Contract: v2/book/checksum Boundary

**Module**: `.importlinter.yaml`

**Contract**:
```yaml
- name: Forbidden v2-book-checksum imports above adapter
  type: forbidden
  rules:
    - importing_modules:
        - trading.strategy
        - trading.risk
        - trading.execution
        - trading.backtest
        - trading.loop
      forbidden_modules:
        - trading.data.adapters.kraken_v2_book
      forbidden_imports:
        - from trading.data.adapters.kraken_v2_book import
        - import trading.data.adapters.kraken_v2_book
      ignore_imports:
        - from trading.data.adapters import KrakenV2BookAdapter  # Factory import only
  rationale: >
    Principle VII requires venue-specific detail confined to adapter.
    This is the clean re-test after prior leak into loop/.
```

### Updated Contract: Loop Isolation

**Module**: `.importlinter.yaml`

**Existing contract (from Sprint 1)**: Loop cannot import adapters directly

**Enforcement**:
```yaml
- name: Forbidden adapter imports in loop
  type: forbidden
  rules:
    - importing_modules:
        - trading.loop
      forbidden_modules:
        - trading.data.adapters.kraken_public
        - trading.data.adapters.kraken_v2_book
        - trading.data.adapters.simulated_feed
  rationale: >
    Loop must use factory.get_feed() only.
    Direct adapter imports violate Principle VII.
```

