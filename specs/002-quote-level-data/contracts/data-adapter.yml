# Data Adapter Interface Contract

**Feature**: 002-quote-level-data
**Version**: 2.0 (Kraken v2 book adapter)
**Date**: 2026-07-15

---

## Purpose

This contract defines the interface between market data adapters and the rest of the system. All adapters must implement this contract to ensure:

1. **Venue independence** (Principle VII) — No venue-specific detail leaks above the adapter
2. **Observable honesty** (Principle V) — Cost model uses real observed spread only
3. **Fail-safe behavior** — Pause on unavailable data, never emit synthetic/fallback values

---

## Consumer Requirements

The following modules consume the data adapter interface and depend on this contract:

- `trading.strategy.*` — Strategy implementations (`decide(market_state)`)
- `trading.risk.*` — Risk engine (`check(desired_position, market_state)`)
- `trading.backtest.*` — Backtest runner and cost model
- `trading.loop.live` — Live trading loop orchestrator
- `trading.execution.paper` — Paper execution (cost model)

---

## Adapter Interface

### Abstract Base

```python
from abc import ABC, abstractmethod
from trading.data.market_state import MarketState
from trading.data.desired_position import DesiredPosition
from trading.logkit.decision import ReasonCode

class MarketFeed(ABC):
    """Abstract market data feed."""

    @abstractmethod
    async def subscribe(self) -> None:
        """Subscribe to data source. Raises FeedError if unavailable."""
        pass

    @abstractmethod
    async def market_states(self) -> AsyncIterator[MarketState]:
        """
        Yield MarketState objects.

        Semantics:
        - MUST yield only when data is valid and complete
        - MUST yield NOTHING (pause) when primary data unavailable
        - MUST NEVER yield MarketState with null/stale/synthetic fields
        - MUST log non-yield events with reason code
        """
        pass

    @property
    @abstractmethod
    def venue_name(self) -> str:
        """Return venue identifier (e.g., 'kraken_public', 'simulated')."""
        pass

    @abstractmethod
    async def close(self) -> None:
        """Close connection and cleanup."""
        pass
```

### MarketFeed Exceptions

```python
class FeedError(Exception):
    """Base exception for feed errors."""
    pass

class FeedUnavailableError(FeedError):
    """Primary data channel unavailable. System must pause."""
    pass

class ChecksumValidationError(FeedError):
    """Checksum validation failed. Update rejected; recovery triggered."""
    pass

# REMOVED 2026-07-19 (WO-009b) — INTERFACE CHANGE, awaiting project-lead ratification
# class SequenceGapError(FeedError):
#     """Sequence gap detected. Book discarded; resnapshot triggered."""
#     pass
#
# Rationale: the Kraken v2 PUBLIC book channel transmits no sequence number, so
# this error's trigger condition CANNOT OCCUR. Under rule 0.1d an enforcement
# construct whose trigger cannot occur in production is a FALSE GUARANTEE.
# REPLACED BY: ChecksumValidationError (above), which already exists and covers
# the real detector. Checksum divergence is strictly broader — it catches missed
# messages, misapplied updates, and our own book-maintenance bugs.
# Preserved commented-out rather than deleted: history is annotated, not laundered.
```

