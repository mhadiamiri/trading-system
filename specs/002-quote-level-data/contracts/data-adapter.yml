## Summary

**This contract ensures**:
1. Above the adapter, only `MarketState` (standard interface) is visible
2. No v2/book/checksum detail leaks into strategy/risk/execution/backtest/loop
3. Cost model uses real observed spread only (no synthetic/fallback)
4. System pauses on unavailable data (never emits bad data)
5. All decisions are observable via reason codes

**Import-linter enforces**:
- v2/book/checksum imports blocked above adapter
- Loop uses factory only (no direct adapter imports)

**Tests prove**:
- Checksum validation bites
- Recovery fires correctly
- No synthetic spread path exists
