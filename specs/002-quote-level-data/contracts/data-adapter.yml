## MarketState Contract

### Required Fields (Sprint 2)

```python
@dataclass
class MarketState:
    timestamp: datetime      # Event timestamp (UTC)
    symbol: str              # Trading pair
    best_bid: Decimal        # Best bid price (>0)
    best_ask: Decimal        # Best ask price (>0)
    best_bid_size: Decimal   # Size at best bid (>=0)
    best_ask_size: Decimal   # Size at best ask (>=0)
    mid_price: Decimal       # Derived: (bid + ask) / 2
    spread: Decimal          # Derived: ask - bid (>=0)
    trade_count: int         # Trades in rolling window (>=0)
    total_volume: Decimal    # Total volume in rolling window (>=0)
    last_price: Optional[Decimal]  # Last trade price in window
```

### Validation Contract

All MarketState objects emitted by adapters MUST satisfy:

```python
def validate_market_state(ms: MarketState) -> bool:
    """Verify MarketState is valid for consumption."""
    assert ms.timestamp is not None
    assert ms.best_bid > 0
    assert ms.best_ask > 0
    assert ms.best_bid < ms.best_ask  # Positive spread
    assert ms.mid_price == (ms.best_bid + ms.best_ask) / 2
    assert ms.spread == ms.best_ask - ms.best_bid
    assert ms.trade_count >= 0
    assert ms.total_volume >= 0
    return True
```

### Pause Contract

When primary data unavailable, adapter MUST:

1. **Stop yielding** MarketState objects
2. **Log** with reason code (e.g., `PAUSE_ON_BOOK_UNAVAILABLE`)
3. **Resume** only when data recovers and validation passes

**Forbidden patterns**:
```python
# FORBIDDEN: Never yield null/stale fields
yield MarketState(best_bid=None, best_ask=None, ...)

# FORBIDDEN: Never yield synthetic spread
yield MarketState(best_bid=last_known_bid, best_ask=last_known_ask, ...)

# FORBIDDEN: Never assume spread on unavailable data
yield MarketState(best_bid=0, best_ask=estimated_spread, ...)
```

