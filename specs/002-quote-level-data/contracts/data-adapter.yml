## Testing Contracts

### Adapter Tests Must Verify

1. **Happy path**: Valid quotes yield valid MarketState
2. **Checksum rejection**: Corrupted update rejected; logged
3. **Recovery**: Resync after 5 failures; resnapshot after gap
4. **Pause**: No yield on book unavailable; logs reason code
5. **No synthetic spread**: Null/abnormal spread never emitted

### Integration Tests Must Verify

1. **Loop pause**: live loop pauses when book unavailable
2. **Backtest honesty**: Replay from stored quotes uses observed spread only
3. **Cost model**: Spread cost computed from bid/ask; no fallback

---

## Reason Codes

### New Codes for Sprint 2

These codes MUST be emitted for non-yield events:

| Code | Context | Semantics |
|-----|---------|-----------|
| `PAUSE_ON_BOOK_UNAVAILABLE` | Book channel lost | System paused; no MarketStates until recovery |
| `CHECKSUM_RESYNC` | 5 consecutive failures | Reconnecting and resyncing book |
| ~~`SEQUENCE_GAP_RESNAPSHOT`~~ | ~~Gap in sequence numbers~~ | **WITHDRAWN 2026-07-19 (WO-009b) — INTERFACE CHANGE, awaiting ratification.** Trigger cannot occur: no sequence numbers on this channel (rule 0.1d). Superseded by `CHECKSUM_RESYNC`. |
| `ABNORMAL_SPREAD_REJECT` | Spread zero/negative/wide | Trade rejected by cost model |

**Implementation**: Add to `LAYER_VERB_DETAIL` in `trading/logkit/decision.py`

