## Adapter Implementations

### KrakenV2BookAdapter (NEW)

**Module**: `src/trading/data/adapters/kraken_v2_book.py`

**Venue**: Kraken WebSocket v2

**Primary Channel**: Book (top-of-book: best bid/ask)

**Secondary Channel**: Trades (enrichment: rolling stats)

**Responsibilities**:
- Subscribe to v2 book and trades channels
- Maintain local book state with checksum validation on EVERY update, computed
  over the POST-update ladder (FR-018a(b),(c))
- ~~Detect sequence gaps and trigger resnapshot~~ **CORRECTED 2026-07-19 (WO-009b):**
  detect CHECKSUM DIVERGENCE and trigger resnapshot, emitting NO MarketState
  until the fresh snapshot applies and validates (FR-018a(d))
- Pause on book unavailability
- Emit MarketState per contract above

**Venue-Specific Details** (must NOT leak):
- v2 protocol (snapshot/incremental format)
- CRC checksum algorithm (post-update, top 10 per side)
- ~~Sequence number tracking~~ **REMOVED 2026-07-19 (WO-009b): not transmitted**
- Subscription depth (pinned at 10; legal values 10/25/100/500/1000)
- Resync/resnapshot logic

**External Interface** (exposed above adapter):
```python
# Only these imports allowed above adapter:
from trading.data.adapters import KrakenV2BookAdapter
from trading.data.market_state import MarketState
```

