## Factory Contract

### get_feed() Function

**Module**: `src/trading/data/adapters/__init__.py`

**Signature**:
```python
def get_feed(data_source: str) -> MarketFeed:
    """
    Return MarketFeed instance for data_source.

    Args:
        data_source: 'simulated', 'kraken_public', 'kraken_v2'

    Returns:
        MarketFeed implementation

    Raises:
        ValueError: Unknown data_source
    """
    if data_source == 'simulated':
        return SimulatedMarketFeed()
    elif data_source == 'kraken_v2':
        return KrakenV2BookAdapter()
    else:
        raise ValueError(f"Unknown data_source: {data_source}")
```

### get_venue_name() Function

**Module**: `src/trading/data/adapters/__init__.py`

**Signature**:
```python
def get_venue_name(feed: MarketFeed) -> str:
    """Return venue name for feed."""
    return feed.venue_name
```

